<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dosmuh Cup</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#000a3d,#001f7a);
    color:white;
    display:flex;
    justify-content:center;
    padding:20px;
}

.container{max-width:900px;width:100%}

h1,h2{text-align:center;color:#ffd700}

.section{
    background:rgba(255,255,255,0.05);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

button{
    background:#ffd700;
    border:none;
    padding:12px 20px;
    border-radius:25px;
    font-weight:bold;
    cursor:pointer;
}

.match{
    background:#111;
    padding:10px;
    margin:10px 0;
    border-left:4px solid gold;
    display:flex;
    justify-content:center;
    gap:10px;
    align-items:center;
}

input{width:40px;text-align:center}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

td,th{
    border:1px solid #555;
    padding:6px;
    text-align:center;
}

.top4{background:#1f8f2f}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<h1>🏆 DOSMUH CUP</h1>

<div class="section" id="start">
<button onclick="draw()">Жеребьевка</button>
</div>

<div id="main" class="hidden">

<div class="section">
<h2>Матчи</h2>
<div id="matches"></div>
<button onclick="update()">Обновить</button>
</div>

<div class="section">
<h2>Таблица</h2>
<table>
<thead>
<tr>
<th>#</th><th>Команда</th><th>И</th><th>О</th><th>РМ</th><th>Г</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<div class="section">
<button onclick="playoff()">В плей-офф</button>
</div>

</div>

<div id="po" class="section hidden">
<h2>Плей-офф</h2>
<div id="poMatches"></div>
</div>

</div>

<script>

const teams=['9A','9B','9G','9V','10B','10G'];
let games=[];

function draw(){

let ok=false;

while(!ok){

let a=[...teams].sort(()=>Math.random()-0.5);
let b=[...teams].sort(()=>Math.random()-0.5);

for(let i=0;i<6;i++){
if(a[i]===b[i]){
let j=(i+1)%6;
[a[i],a[j]]=[a[j],a[i]];
}
}

ok=true;

for(let i=0;i<6;i++){
if(
(a[i]=='9B'&&b[i]=='10G')||
(a[i]=='10G'&&b[i]=='9B')
){
ok=false;
}
}

if(ok){
games=[];
for(let i=0;i<6;i++){
games.push([a[i],b[i]]);
}
}

}

render();
document.getElementById('start').classList.add('hidden');
document.getElementById('main').classList.remove('hidden');
}

function render(){
let div=document.getElementById('matches');
div.innerHTML='';

games.forEach((g,i)=>{
div.innerHTML+=`
<div class="match">
${g[0]} 
<input id="a${i}">
:
<input id="b${i}">
${g[1]}
</div>`;
});
}

function update(){

let stat={};

teams.forEach(t=>{
stat[t]={p:0,pts:0,gd:0,gs:0};
});

games.forEach((g,i)=>{
let s1=parseInt(document.getElementById('a'+i).value)||0;
let s2=parseInt(document.getElementById('b'+i).value)||0;

stat[g[0]].p++;
stat[g[1]].p++;

stat[g[0]].gs+=s1;
stat[g[1]].gs+=s2;

stat[g[0]].gd+=(s1-s2);
stat[g[1]].gd+=(s2-s1);

if(s1>s2) stat[g[0]].pts+=3;
else if(s2>s1) stat[g[1]].pts+=3;
else{
stat[g[0]].pts+=1;
stat[g[1]].pts+=1;
}

});

let sorted=[...teams].sort((a,b)=>
stat[b].pts-stat[a].pts ||
stat[b].gd-stat[a].gd ||
stat[b].gs-stat[a].gs
);

let tb=document.getElementById('table');
tb.innerHTML='';

sorted.forEach((t,i)=>{
tb.innerHTML+=`
<tr class="${i<4?'top4':''}">
<td>${i+1}</td>
<td>${t}</td>
<td>${stat[t].p}</td>
<td>${stat[t].pts}</td>
<td>${stat[t].gd}</td>
<td>${stat[t].gs}</td>
</tr>`;
});

window.sorted=sorted;
}

function playoff(){

let t=window.sorted.slice(0,4);

let pairs=[
[t[0],t[3]],
[t[1],t[2]]
];

let div=document.getElementById('poMatches');
div.innerHTML='';

pairs.forEach(p=>{
div.innerHTML+=`
<div class="match">
${p[0]} vs ${p[1]}
</div>`;
});

document.getElementById('po').classList.remove('hidden');
}

</script>

</body>
</html>
