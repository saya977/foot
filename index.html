<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dosmuh Cup - Randomizer Stage</title>

<style>
:root {
    --ucl-blue: #000a3d;
    --ucl-gold: #d4af37;
    --ucl-light-blue: #003399;
    --white: #ffffff;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #001e4d 0%, #000a3d 100%);
    color: white;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container { max-width: 900px; width: 100%; }

.section {
    border: 1px solid var(--ucl-gold);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}

h1, h2 { text-align: center; color: var(--ucl-gold); }

button {
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.hidden { display: none; }

.match-card {
    border-left: 5px solid gold;
    padding: 15px;
    margin: 10px 0;
}

.score-input { width: 40px; text-align: center; }
.authors-input { width: 100%; margin-top: 5px; }
</style>
</head>

<body>

<div class="container">

<div id="setupZone" class="section">
<h2>Жеребьевка</h2>
<button onclick="runRandomizer()">Старт</button>
</div>

<div id="mainContent" class="hidden">
<h2>Матчи</h2>
<div id="leagueMatches"></div>
<button onclick="startPlayoffs()">В плей-офф</button>
</div>

<div id="playoffSection" class="hidden">
<h2>Плей-офф</h2>
<div id="playoffMatches"></div>
<button onclick="generateFinal()">Финал</button>
</div>

<div id="finalSection" class="hidden">
<h2>Финал</h2>
<div id="finalMatch"></div>
</div>

</div>

<script>

const teamsList = ['9A','9B','9G','9V','10B','10G'];
let leagueMatchesData = [];

async function runRandomizer() {

    let valid = false;

    while(!valid) {

        let pool1 = [...teamsList].sort(() => Math.random() - 0.5);
        let pool2 = [...teamsList].sort(() => Math.random() - 0.5);

        for(let i=0;i<6;i++){
            if(pool1[i] === pool2[i]){
                let j = (i+1)%6;
                [pool2[i], pool2[j]] = [pool2[j], pool2[i]];
            }
        }

        valid = true;

        for(let i=0;i<6;i++){
            if(
                (pool1[i]==='9B' && pool2[i]==='10G') ||
                (pool1[i]==='10G' && pool2[i]==='9B')
            ){
                valid = false;
                break;
            }
        }

        if(valid){
            leagueMatchesData = [];
            for(let i=0;i<6;i++){
                leagueMatchesData.push([pool1[i], pool2[i]]);
            }
        }
    }

    renderLeagueMatches();
    document.getElementById('setupZone').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
}

function renderLeagueMatches(){
    const div = document.getElementById('leagueMatches');
    div.innerHTML = '';

    leagueMatchesData.forEach((m,i)=>{
        div.innerHTML += `
        <div class="match-card">
            ${m[0]} 
            <input class="score-input"> : 
            <input class="score-input"> 
            ${m[1]}
            <input class="authors-input" placeholder="Голы...">
        </div>`;
    });
}

function startPlayoffs(){

    const top4 = teamsList.slice(0,4);

    const pairs = [
        [top4[0], top4[3]],
        [top4[1], top4[2]]
    ];

    const div = document.getElementById('playoffMatches');
    div.innerHTML = '';

    pairs.forEach((p,i)=>{
        div.innerHTML += `
        <div class="match-card">
            <span id="sf-${i}-0">${p[0]}</span>
            <input id="s-${i}-0" class="score-input"> :
            <input id="s-${i}-1" class="score-input">
            <span id="sf-${i}-1">${p[1]}</span>
        </div>`;
    });

    document.getElementById('playoffSection').classList.remove('hidden');
}

function generateFinal(){

    let finalists = [];

    for(let i=0;i<2;i++){
        let s1 = parseInt(document.getElementById(`s-${i}-0`).value)||0;
        let s2 = parseInt(document.getElementById(`s-${i}-1`).value)||0;

        if(s1>=s2) finalists.push(document.getElementById(`sf-${i}-0`).innerText);
        else finalists.push(document.getElementById(`sf-${i}-1`).innerText);
    }

    document.getElementById('finalMatch').innerHTML = `
    <div class="match-card">
        ${finalists[0]} vs ${finalists[1]}
    </div>`;

    document.getElementById('finalSection').classList.remove('hidden');
}

</script>

</body>
</html>
